<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kumbh Saathi WhatsApp Simulator</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #14213d;
        background: #f4f7f2;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(980px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 24px;
        align-items: start;
      }
      section {
        background: white;
        border: 1px solid #d8dfd2;
        border-radius: 10px;
        box-shadow: 0 12px 30px rgba(20, 33, 61, 0.08);
      }
      .phone {
        overflow: hidden;
      }
      .phone-header {
        background: #075e54;
        color: white;
        padding: 16px;
      }
      h1, h2, p {
        margin: 0;
      }
      h1 {
        font-size: 20px;
      }
      .sub {
        margin-top: 4px;
        opacity: 0.82;
        font-size: 13px;
      }
      .chat {
        height: 460px;
        padding: 16px;
        background: #e6ddd5;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bubble {
        max-width: 88%;
        padding: 10px 12px;
        border-radius: 8px;
        white-space: pre-wrap;
        line-height: 1.35;
        font-size: 14px;
      }
      .user {
        align-self: flex-end;
        background: #dcf8c6;
      }
      .bot {
        align-self: flex-start;
        background: #fff;
      }
      form {
        display: grid;
        gap: 10px;
        padding: 12px;
      }
      textarea, input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccd6c7;
        border-radius: 8px;
        padding: 10px;
        font: inherit;
      }
      textarea {
        min-height: 82px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #128c7e;
        color: white;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .panel {
        padding: 18px;
      }
      .examples {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }
      .example {
        text-align: left;
        background: #fff7ed;
        color: #7c2d12;
        border: 1px solid #fed7aa;
      }
      pre {
        margin: 14px 0 0;
        max-height: 360px;
        overflow: auto;
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 8px;
        font-size: 12px;
      }
      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="phone">
        <div class="phone-header">
          <h1>Kumbh Saathi</h1>
          <p class="sub">WhatsApp simulator</p>
        </div>
        <div id="chat" class="chat">
          <div class="bubble bot">Namaste. Send a missing-person report, found-person report, or suspicious booking/payment message.</div>
        </div>
        <form id="form">
          <input id="from" value="whatsapp:+919876543210" aria-label="From number" />
          <textarea id="body" placeholder="Type a WhatsApp message..."></textarea>
          <button type="submit">Send</button>
        </form>
      </section>

      <section class="panel">
        <h2>Demo Messages</h2>
        <p class="sub">Click one, then send. Each message writes to Supabase and should appear live in the command center.</p>
        <div class="examples">
          <button class="example" data-text="Meri dadi Ramkund Ghat ke paas kho gayi hai. 75 saal ki hain, green saree pehni hai, Maithili bolti hain, naam yaad nahi aa raha.">Missing elder, Hindi</button>
          <button class="example" data-text="Found one elderly man near Trimbakeshwar Approach. Around 80 years, white kurta, speaks Bhojpuri, looks confused.">Found confused elder</button>
          <button class="example" data-text="My son Raju is missing near Panchavati Circle. 8 years old, red cartoon t-shirt, blue shorts, speaks Hindi.">Missing child</button>
          <button class="example" data-text="Hotel Kumbh Palace: Pay advance Rs 8000 now to rajbooking@upi in 10 minutes or room cancelled. Send Aadhaar and OTP for confirmation. Call 9876543210.">Trust Check, high concern</button>
        </div>
        <pre id="debug">Waiting for message...</pre>
      </section>
    </main>

    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("form");
      const body = document.getElementById("body");
      const from = document.getElementById("from");
      const debug = document.getElementById("debug");

      function addBubble(text, cls) {
        const el = document.createElement("div");
        el.className = `bubble ${cls}`;
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      }

      document.querySelectorAll(".example").forEach((button) => {
        button.addEventListener("click", () => {
          body.value = button.dataset.text;
          body.focus();
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = body.value.trim();
        if (!text) return;
        addBubble(text, "user");
        body.value = "";
        debug.textContent = "Sending...";
        try {
          const res = await fetch("/api/whatsapp/simulate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ from: from.value, body: text }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Request failed");
          addBubble(data.reply, "bot");
          debug.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          addBubble(`Error: ${error.message}`, "bot");
          debug.textContent = error.stack || error.message;
        }
      });
    </script>
  </body>
</html>
